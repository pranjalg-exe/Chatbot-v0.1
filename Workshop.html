<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workshop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="workshop.css" />
  </head>
  <body>
    <nav>
      <nav>
        <div id="logo">
          <img src="workshop1.png" alt="" />
        </div>

        <div class="center">
          <p>Home</p>
          <p>About</p>
        </div>

        <div id="login">Login</div>
    </nav>

<div class="chatbot">
        <div id="chatbox" style="height: calc(100% - 3rem); overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 10px;">
        </div>

        <div class="sendChat">
            <input type="text" id="userInput" placeholder="Type your message here..." />
            <div class="sendButton"><button id="sendBtn"><i class="fa fa-paper-plane" aria-hidden="true"></i></button></div>
        </div>
      </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sendBtn = document.getElementById("sendBtn");
            const userInput = document.getElementById("userInput");
            const chatbox = document.getElementById("chatbox");

            function sendMessage() {
                const text = userInput.value.trim();
                if (text === "") return;

                //  Display the User's message on the screen
                chatbox.innerHTML += `<div style="text-align: right; background: #e0f7fa; padding: 5px 10px; border-radius: 10px; align-self: flex-end;">${text}</div>`;
                userInput.value = ""; // Clear input field
                chatbox.scrollTop = chatbox.scrollHeight; // Scroll to bottom

                // Send the message to your Flask backend
                fetch("http://127.0.0.1:5000/chat", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ msg: text })
                })
                .then(response => response.json())
                .then(data => {
                    // Display the Chatbot's reply on the screen
                    chatbox.innerHTML += `<div style="text-align: left; background: #f1f1f1; padding: 5px 10px; border-radius: 10px; align-self: flex-start;">${data.reply}</div>`;
                    chatbox.scrollTop = chatbox.scrollHeight; // Scroll to bottom
                })
                .catch(error => {
                    console.error("Error:", error);
                    chatbox.innerHTML += `<div style="color: red; text-align: center; font-size: 0.9em;">Error: Make sure your Flask backend is running.</div>`;
                });
            }

            sendBtn.addEventListener("click", sendMessage);

            userInput.addEventListener("keypress", function (e) {
                if (e.key === "Enter") {
                    sendMessage();
                }
            });
        });
    </script>
  </body>
</html>
